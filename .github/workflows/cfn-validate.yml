name: cfn-validate

on:
  pull_request:
    paths:
      - "cfn/**"
      - ".github/workflows/cfn-validate.yml"

permissions:
  contents: read          # checkout

jobs:
  validate:
    name: cfn-lint + cfn-nag + aws validate-template
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out config repo
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.7

      - name: Set up Python (for cfn-lint)
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: "3.12"

      - run: pip install cfn-lint==1.10.3

      - name: Set up Ruby (for cfn-nag)
        uses: ruby/setup-ruby@a4effe49ee8ee5b8b5091268c473a4628afb5651 # v1.211.0
        with:
          ruby-version: "3.3"

      - run: gem install cfn-nag -v 0.8.10

      - name: cfn-lint
        run: cfn-lint cfn/*.yaml

      - name: cfn-nag
        run: cfn_nag_scan --input-path cfn --output-format txt --fail-on-warnings

      - name: Configure AWS credentials (ambient)
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      - name: aws cloudformation validate-template (bootstrap)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/multistate-bootstrap-dev.yaml \
            --region us-east-1

      - name: aws cloudformation validate-template (network)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/multistate-network-dev.yaml \
            --region us-east-1

      - name: aws cloudformation validate-template (app)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/multistate-app-dev.yaml \
            --region us-east-1

      - name: aws cloudformation validate-template (artifacts)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/multistate-artifacts-dev.yaml \
            --region us-east-1

      - name: aws cloudformation validate-template (cost)
        run: |
          aws cloudformation validate-template \
            --template-body file://cfn/multistate-cost-dev.yaml \
            --region us-east-1

