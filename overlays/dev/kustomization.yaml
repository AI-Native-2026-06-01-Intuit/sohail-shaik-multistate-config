# overlays/dev/kustomization.yaml — dev overlay (smallest patch over W5 D3 base).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: multistate-dev

commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"

images:
  - name: uptimecrew/multistate-api
    newName: uptimecrew/multistate-api
    newTag: local-w6d2

replicas:
  - name: multistate-api
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: multistate-api-config
    patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: dev
      - op: replace
        path: /data/LOGGING_LEVEL_ROOT
        value: DEBUG
