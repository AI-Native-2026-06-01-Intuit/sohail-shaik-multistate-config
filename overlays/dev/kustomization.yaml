# overlays/dev/kustomization.yaml — dev overlay (W5 D3 base + W6 D5 scaling).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# W6 D5 — scaling / tracing (synced into multistate-dev)
resources:
- ../../base
- ../../k8s/multistate-api
# Note: k8s/karpenter/multistate-mixed.yaml is cluster-scoped;
# apply separately (kubectl / platform App) — not in this overlay.

namespace: multistate-dev

commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"

images:
- name: uptimecrew/multistate-api
  newName: uptimecrew/multistate-api
  newTag: 2f0a26fe387a35ea322ee55ed6adc2713d9ce4b6

# HPA owns replica count (minReplicas: 3). Do NOT pin replicas
# here — a Kustomize replicas: 1 fights the HPA and flaps the
# Deployment during Argo sync (W6 D5 rubric Done-when).

# Tolerations + label so API pods can land on the
# multistate-mixed Karpenter NodePool (taint workload=multistate-api).
# Seed replicas at HPA floor before the HPA controller attaches.
patches:
- patch: |-
    - op: replace
      path: /data/SPRING_PROFILES_ACTIVE
      value: k8s
    - op: replace
      path: /data/LOGGING_LEVEL_ROOT
      value: DEBUG
  target:
    kind: ConfigMap
    name: multistate-api-config
- patch: |-
    - op: add
      path: /metadata/labels/app
      value: multistate-api
    - op: add
      path: /spec/template/metadata/labels/app
      value: multistate-api
    - op: add
      path: /spec/template/spec/tolerations
      value:
        - key: workload
          operator: Equal
          value: multistate-api
          effect: NoSchedule
    - op: add
      path: /spec/template/spec/nodeSelector
      value:
        workload: multistate-api
  target:
    kind: Deployment
    name: multistate-api
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: multistate-api
