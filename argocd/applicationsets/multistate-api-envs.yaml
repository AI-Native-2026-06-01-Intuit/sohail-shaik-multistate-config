# argocd/applicationsets/multistate-api-envs.yaml — matrix generator for dev/staging/prod.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multistate-api-envs
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - env: dev
                  overlay: overlays/dev
                  namespace: multistate-dev
                  wave: "0"
                - env: staging
                  overlay: overlays/staging
                  namespace: multistate-staging
                  wave: "1"
                - env: prod
                  overlay: overlays/prod
                  namespace: multistate-prod
                  wave: "2"
          - clusters:
              selector:
                matchLabels:
                  uptimecrew.example.internal/tier: workload
  template:
    metadata:
      name: multistate-api-{{env}}
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "{{wave}}"
      labels:
        env: "{{env}}"
        team: multistate
    spec:
      project: multistate
      source:
        repoURL: https://github.com/AI-Native-2026-06-01-Intuit/sohail-shaik-multistate-config.git
        path: "{{overlay}}"
        targetRevision: main
      destination:
        server: "{{server}}"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
