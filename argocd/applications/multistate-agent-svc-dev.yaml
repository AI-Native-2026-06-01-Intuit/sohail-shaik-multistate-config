# argocd/applications/multistate-agent-svc-dev.yaml — W7 D5 agent-svc Application.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multistate-agent-svc
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    env: dev
    team: multistate
    component: agent-svc
spec:
  project: multistate
  source:
    repoURL: https://github.com/AI-Native-2026-06-01-Intuit/sohail-shaik-multistate-config.git
    path: multistate-agent-svc/overlays/dev
    targetRevision: w7d5-agent-svc
  destination:
    server: https://kubernetes.default.svc
    namespace: multistate-svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
