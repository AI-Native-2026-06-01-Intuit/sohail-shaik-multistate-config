# argocd/applications/multistate-api-dev.yaml — dev Application anchor (Task 1).
# Task 3 ApplicationSet owns runtime sync; keep this file as the readable anchor.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multistate-api-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    env: dev
    team: multistate
spec:
  project: multistate
  source:
    repoURL: https://github.com/AI-Native-2026-06-01-Intuit/sohail-shaik-multistate-config.git
    path: overlays/dev
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: multistate-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
