# k8s/multistate-api/hpa.yaml
# TASK 2: SLO-derived HPA on a custom Prometheus metric.
# The W5D5 Micrometer pipeline exposes multistate_inflight_requests
# (per-replica inflight requests) on /actuator/prometheus;
# the Prometheus Adapter bridges it to the HPA external
# metrics API.
#
# Why custom-metric instead of CPU-only: multistate-api pods
# spend ~95% of wall-clock blocked on the Bedrock network
# call; CPU never crosses 30% even when 30 requests are
# queued behind the proxy. A CPU-only HPA pins the floor
# and users see 4-second waits. Section 9 sticking point
# #1 covers this in detail.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: multistate-api-hpa
  namespace: multistate-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: multistate-api
  minReplicas: 3
  maxReplicas: 28
  metrics:
    # Pods metric source: per-pod inflight gauge averaged
    # across the Deployment. Target 7
    # comes from a single-replica saturation load test:
    # we ramped one pod until p99 reached the SLO of
    # 900 ms; that number per pod is the
    # SLO-derived target.
    - type: Pods
      pods:
        metric:
          name: multistate_inflight_requests
        target:
          type: AverageValue
          averageValue: "7"
  behavior:
    scaleDown:
      # 10-minute stabilization window so a bursty dip
      # doesn't cost a cold-start cycle when load returns.
      # W5D3 callback: the default 5 minutes is too short
      # for the bursty-but-LLM-bound profile.
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      # Task brief: scale-up stabilisation 30s so HPA reacts
      # quickly on a spike without oscillating every scrape.
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
        # selectPolicy: Max means the more aggressive of
        # the two scale-up policies wins on a spike.
      selectPolicy: Max
