# base/60-multistate-api.servicemonitor.yaml — Prometheus scrape target.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: multistate-api
  namespace: multistate-dev
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: multistate-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: multistate-api
  namespaceSelector:
    matchNames:
      - multistate-dev
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
